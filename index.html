<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BecomeChampion">

  <!-- SEO / Description -->
  <meta name="description" content="战锤40K 阶段提示工具 — 离线可用，手机优先，无需联网">
  <meta name="robots" content="noindex"><!-- local app, no indexing needed -->

  <title>BecomeChampion — W40K 规则助手</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- App root — content injected by app.js -->
  <div id="app">
    <div class="loading-screen">
      <div class="loading-logo">⚔️</div>
      <div class="loading-text">BecomeChampion</div>
      <div class="loading-sub">战锤40K 规则助手</div>
    </div>
  </div>

  <!-- Force-update Service Worker to break old cache -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.unregister(); });
      }).then(function() {
        return navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
  <script src="sample-pack.js"></script>
  <script src="builtin-packs.js"></script>
  <script src="app.js"></script>
</body>
</html>
